<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GT-MARKDAWIN — محرر ماركداون متطور</title>
  <meta name="description" content="محرر مارك داون عصري يدعم العربية" />
  <meta name="theme-color" content="#0b0f13" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="gt-markdawin-icon.png" type="image/png" />
  <!-- html2pdf bundle -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="left-head">
        <h1 class="app-title">📝 GT-MARKDAWIN</h1>
        <div class="subtitle">محرر ماركداون عربي عصري</div>
      </div>
      <div class="header-right">
        <select id="fontSelector" class="font-selector" title="اختيار الخط">
          <option value="__system__">افتراضي النظام</option>
        </select>
        <button id="importFontsBtn" class="btn-icon" title="استيراد/تحديث الخطوط">🧾</button>
        <button id="emojiBtnHeader" class="btn-icon" title="الرموز التعبيرية">😊</button>
        <button id="themeToggle" class="btn-icon" title="تبديل السمة">☀️</button>
        <button id="dirToggle" class="btn-icon" title="تبديل اتجاه النص">↔</button>
        <button id="fullscreenToggle" class="btn-icon" title="ملء الشاشة">⛶</button>
      </div>
    </header>

    <nav class="toolbar" aria-label="شريط أدوات الماركداون">
      <div class="toolbar-group">
        <button data-cmd="bold" class="toolbar-btn" title="عريض (Ctrl+B)"><strong>B</strong></button>
        <button data-cmd="italic" class="toolbar-btn" title="مائل (Ctrl+I)"><em>I</em></button>
        <button data-cmd="code" class="toolbar-btn" title="كود inline">{ }</button>
        <button data-cmd="codeblock" class="toolbar-btn" title="كتلة كود">```</button>
        <button data-cmd="blockquote" class="toolbar-btn" title="اقتباس">❝</button>
        <button data-cmd="hr" class="toolbar-btn" title="فاصل">―――</button>
      </div>

      <div class="toolbar-group">
        <button data-cmd="h1" class="toolbar-btn">H1</button>
        <button data-cmd="h2" class="toolbar-btn">H2</button>
        <button data-cmd="h3" class="toolbar-btn">H3</button>
        <button data-cmd="h4" class="toolbar-btn">H4</button>
        <button data-cmd="h5" class="toolbar-btn">H5</button>
        <button data-cmd="h6" class="toolbar-btn">H6</button>
      </div>

      <div class="toolbar-group">
        <button data-cmd="ul" class="toolbar-btn">• قائمة</button>
        <button data-cmd="ol" class="toolbar-btn">1. قائمة</button>
        <button data-cmd="task" class="toolbar-btn">☑️ مهمة</button>
      </div>

      <div class="toolbar-group">
        <button data-cmd="table" class="toolbar-btn">جدول</button>
        <button data-cmd="link" class="toolbar-btn">🔗 رابط</button>
        <button data-cmd="image" class="toolbar-btn">🖼️ صورة</button>
        <button data-cmd="align-left" class="toolbar-btn" title="محاذاة يسار">⇤</button>
        <button data-cmd="align-center" class="toolbar-btn" title="محاذاة وسط">⇆</button>
        <button data-cmd="align-right" class="toolbar-btn" title="محاذاة يمين">⇥</button>
      </div>
    </nav>

    <main class="editor-container split">
      <div class="editor-panel">
        <div class="panel-header">
          <h3>✍️ الكتابة</h3>
          <div class="editor-actions">
            <button id="togglePreview" class="btn-primary">إخفاء المعاينة</button>
            <button id="focusEditorBtn" class="btn-secondary" title="عرض النص فقط">تكبير المحرر</button>
            <button id="clearBtn" class="btn-secondary">مسح</button>
            <button id="importBtn" class="btn-secondary">استيراد</button>
          </div>
        </div>
        <textarea id="editor" placeholder="# مرحبًا بك في GT-MARKDAWIN

اكتب نص ماركداون هنا...

## الميزات:
- تحويل تلقائي إلى HTML
- دعم كامل للغة العربية
- تصدير إلى PDF و HTML
- رموز تعبيرية مدمجة"></textarea>
      </div>

      <div class="preview-panel">
        <div class="panel-header">
          <h3>👁️ المعاينة</h3>
          <div class="preview-actions">
            <button id="exportHtml" class="btn-secondary">تصدير HTML</button>
            <button id="exportPdf" class="btn-secondary">تصدير PDF</button>
            <button id="focusPreviewBtn" class="btn-secondary" title="عرض المعاينة كاملة">تكبير المعاينة</button>
          </div>
        </div>
        <div id="preview" class="preview-content">
          <p class="preview-empty">اكتب شيئًا ليعرض هنا...</p>
        </div>
      </div>
    </main>

    <footer class="status-bar footer">
      <div class="status-info">
        <span id="wordCount">الكلمات: 0</span>
        <span id="charCount">الحروف: 0</span>
        <span id="lineCount">السطور: 1</span>
      </div>
      <div class="status-actions">
        <button id="saveBtn" class="btn-success">💾 حفظ (Markdown)</button>
        <button id="loadBtn" class="btn-secondary">📂 فتح ملف</button>
      </div>
    </footer>

    <div class="site-footer" role="contentinfo">
      <small>مطور: SalehGNUTUX — <a href="https://github.com/SalehGNUTUX/GT-MARKDAWIN" target="_blank" rel="noopener">رابط المستودع على GitHub</a></small>
    </div>
  </div>

  <div id="emojiPanel" class="emoji-panel hidden" aria-hidden="true"></div>

  <div id="linkModal" class="modal hidden" aria-hidden="true">
    <div class="modal-content">
      <h3>🔗 إدراج رابط</h3>
      <label>نص الرابط</label>
      <input id="linkText" type="text" placeholder="نص الرابط (اختياري)" />
      <label>رابط URL</label>
      <input id="linkUrl" type="url" placeholder="https://example.com" />
      <div style="margin-top:12px; display:flex; gap:8px; justify-content:flex-end;">
        <button id="cancelLink" class="btn-secondary">إلغاء</button>
        <button id="insertLink" class="btn-primary">إدراج</button>
      </div>
    </div>
  </div>

  <div id="imageModal" class="modal hidden" aria-hidden="true">
    <div class="modal-content">
      <h3>🖼️ إدراج صورة</h3>
      <label>النص البديل</label>
      <input id="imageAlt" type="text" placeholder="نص بديل للصورة" />
      <label>رابط الصورة URL</label>
      <input id="imageUrl" type="url" placeholder="https://example.com/image.png" />
      <div style="margin-top:12px; display:flex; gap:8px; justify-content:flex-end;">
        <button id="cancelImage" class="btn-secondary">إلغاء</button>
        <button id="insertImage" class="btn-primary">إدراج</button>
      </div>
    </div>
  </div>

  <script src="marked.umd.js"></script>
  <script src="script.js"></script>
</body>
</html>
